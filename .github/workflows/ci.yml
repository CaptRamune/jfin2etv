name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # region agent log: confirm runner repo layout (H1)
      - name: Debug — runner layout
        run: |
          echo "pwd=$(pwd)"
          echo "--- top-level ---"
          ls -la
          echo "--- lockfiles ---"
          ls -la uv.lock Gemfile.lock 2>&1 || true
      # endregion
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install Ruby (needed by ruby_bridge unit tests)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: false
      # region agent log: explicit bundle install since we have no Gemfile.lock (H5)
      - name: Install Ruby gems (without group dev/test)
        run: |
          gem install bundler --no-document
          bundle config set --local without 'development test' || true
          bundle install
          echo "--- gem list ---"
          bundle list || gem list method_source
      # endregion
      # region agent log: prove uv sync result and python version (H7)
      - name: Sync dependencies
        run: |
          set -x
          uv sync --frozen --extra dev || uv sync --extra dev
          uv run python --version
          uv pip list | head -40
      # endregion
      # region agent log: ruff/mypy explicit (H6)
      - name: Ruff
        run: uv run ruff check .
        continue-on-error: true
      - name: Mypy
        run: uv run mypy src/
        continue-on-error: true
      # endregion
      # region agent log: pytest with verbose tracebacks (H8/H9)
      - name: Pytest
        run: |
          which ruby && ruby --version
          uv run pytest -x --tb=long -v 2>&1 | tee pytest.log
      # endregion

  ruby:
    name: Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # region agent log: confirm runner repo layout (H1)
      - name: Debug — runner layout
        run: |
          echo "pwd=$(pwd)"
          ls -la Gemfile spec lib 2>&1 || true
      # endregion
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - name: RSpec
        run: bundle exec rspec
      - name: RuboCop
        run: bundle exec rubocop
        continue-on-error: true

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[e2e]')
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - run: uv sync --frozen --extra dev || uv sync --extra dev
      - name: Run e2e
        env:
          JFIN2ETV_E2E: "1"
          JELLYFIN_API_KEY: ${{ secrets.JELLYFIN_API_KEY }}
        run: uv run pytest -m slow tests/e2e -x

  image:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [python, ruby]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/captramune/jfin2etv
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=jfin2etv-${{ hashFiles('pyproject.toml','uv.lock','Gemfile','Gemfile.lock') }}
          cache-to: |
            type=gha,mode=max,scope=jfin2etv-${{ hashFiles('pyproject.toml','uv.lock','Gemfile','Gemfile.lock') }}
